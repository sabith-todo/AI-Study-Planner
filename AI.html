<!DOCTYPE html>
<html>
<head>
    <title>AI Study Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f6f9;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .content-box {
            margin: 30px auto;
            width: 60%;
            padding: 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: none;
        }
    </style>
</head>

<body>

    <h1>AI Based Study Planner</h1>

    <input type="text" id="topicInput" placeholder="Enter your topic">
    <button onclick="generateContent()">Generate</button>

    <div class="content-box" id="resultBox"></div>

    <script>
        function generateContent() {
            let topic = document.getElementById("topicInput").value;
            let box = document.getElementById("resultBox");

            if (topic === "") {
                alert("Please enter a topic!");
                return;
            }

            box.style.display = "block";
            box.innerHTML = `
                <h2>Study Plan for ${topic}</h2>
                <p>1. Introduction to ${topic}</p>
                <p>2. Important Concepts of ${topic}</p>
                <p>3. Practice Questions</p>
                <p>4. Revision & Summary</p>
            `;
        }
    </script>

</body>
</html>
